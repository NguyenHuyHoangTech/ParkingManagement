<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo QR Thanh Toán & Xác Nhận Tự Động PayOS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            background-color: #f4f7f6;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #qrcode {
            margin: 20px auto;
            padding: 15px;
            background: white;
            display: flex;
            justify-content: center;
        }
        
        .error { color: #dc3545; margin-top: 10px; font-weight: bold; }
        .info { color: #28a745; margin-top: 10px; font-weight: bold; }
        .checking { color: #ff9800; margin-top: 10px; font-weight: bold; font-size: 14px; }
        
        #checkoutUrl {
            display: none;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }

        /* Styling cho phần Cảm ơn */
        #successMessage {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            animation: fadeIn 0.5s ease-in-out;
        }
        #successMessage h3 { margin: 0 0 10px 0; }
        #successMessage p { margin: 0; font-size: 14px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Thanh toán PayOS</h2>
        <p>Nội dung: <strong>Hello Payos</strong></p>
        <p>Số tiền: <strong>10,000 VNĐ</strong></p>
        
        <button id="btn-generate" onclick="generatePayOSQR()">Tạo Mã QR</button>
        
        <div id="status" class="info"></div>
        <div id="error" class="error"></div>
        
        <div id="qr-container">
            <div id="qrcode"></div>
            <a id="checkoutUrl" href="#" target="_blank">Hoặc mở trang thanh toán PayOS</a>
        </div>

        <!-- Khối hiển thị cảm ơn -->
        <div id="successMessage">
            <h3>🎉 Thanh toán thành công!</h3>
            <p>Cảm ơn bạn. Chúng tôi đã nhận được tiền.</p>
        </div>
    </div>

    <script>
        const CLIENT_ID = "a30f5213-fb75-41bb-9050-031494c4141c";
        const API_KEY = "53b72ce8-9c23-4b82-ab44-fbfd2cf363a1";
        const CHECKSUM_KEY = "d46c959fd13253811f1c38591914de1a649d3ab9ad1443ba6aa71659f875b254";
        
        let pollingInterval = null;

        async function generatePayOSQR() {
            // Reset giao diện
            document.getElementById("qrcode").innerHTML = "";
            document.getElementById("error").innerText = "";
            document.getElementById("status").className = "info";
            document.getElementById("status").innerText = "Đang khởi tạo...";
            document.getElementById("checkoutUrl").style.display = "none";
            document.getElementById("successMessage").style.display = "none";
            document.getElementById("qr-container").style.display = "block";
            document.getElementById("btn-generate").disabled = true;

            // Xóa bộ đếm cũ nếu có
            if (pollingInterval) clearInterval(pollingInterval);

            const orderCode = Number(String(Date.now()).slice(-6));
            const amount = 10000; 
            const description = "Hello Payos";
            const returnUrl = window.location.href; 
            const cancelUrl = window.location.href; 

            const signatureData = `amount=${amount}&cancelUrl=${cancelUrl}&description=${description}&orderCode=${orderCode}&returnUrl=${returnUrl}`;
            const signature = CryptoJS.HmacSHA256(signatureData, CHECKSUM_KEY).toString(CryptoJS.enc.Hex);

            const bodyPayload = {
                orderCode: orderCode,
                amount: amount,
                description: description,
                cancelUrl: cancelUrl,
                returnUrl: returnUrl,
                signature: signature
            };

            try {
                const response = await fetch("https://api-merchant.payos.vn/v2/payment-requests", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-client-id": CLIENT_ID,
                        "x-api-key": API_KEY
                    },
                    body: JSON.stringify(bodyPayload)
                });

                const data = await response.json();

                if (data.code === "00") {
                    document.getElementById("status").className = "checking";
                    document.getElementById("status").innerText = "Đang chờ bạn quét mã thanh toán...";
                    
                    new QRCode(document.getElementById("qrcode"), {
                        text: data.data.qrCode,
                        width: 250,
                        height: 250,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });

                    const checkoutBtn = document.getElementById("checkoutUrl");
                    checkoutBtn.href = data.data.checkoutUrl;
                    checkoutBtn.style.display = "inline-block";

                    // Gọi hàm kiểm tra trạng thái tự động
                    checkPaymentStatus(orderCode);
                } else {
                    document.getElementById("status").innerText = "";
                    document.getElementById("error").innerText = "Lỗi từ hệ thống: " + data.desc;
                    document.getElementById("btn-generate").disabled = false;
                }
            } catch (error) {
                document.getElementById("status").innerText = "";
                document.getElementById("error").innerText = "Lỗi kết nối: " + error.message;
                document.getElementById("btn-generate").disabled = false;
            }
        }

        // Hàm gọi API kiểm tra trạng thái liên tục
        function checkPaymentStatus(orderCode) {
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`https://api-merchant.payos.vn/v2/payment-requests/${orderCode}`, {
                        method: "GET",
                        headers: {
                            "Content-Type": "application/json",
                            "x-client-id": CLIENT_ID,
                            "x-api-key": API_KEY
                        }
                    });
                    
                    const data = await response.json();

                    // Trạng thái 'PAID' nghĩa là khách đã chuyển khoản thành công
                    if (data.code === "00" && data.data && data.data.status === "PAID") {
                        // Dừng vòng lặp kiểm tra
                        clearInterval(pollingInterval);
                        
                        // Ẩn QR Code và thông báo chờ
                        document.getElementById("qr-container").style.display = "none";
                        document.getElementById("status").innerText = "";
                        
                        // Hiển thị thông báo thành công
                        document.getElementById("successMessage").style.display = "block";
                        
                        // Kích hoạt lại nút để tạo mới nếu cần
                        document.getElementById("btn-generate").disabled = false;
                        document.getElementById("btn-generate").innerText = "Tạo mã QR mới";
                    }
                } catch (error) {
                    console.log("Lỗi trong quá trình kiểm tra trạng thái:", error);
                }
            }, 3000); // Lặp lại mỗi 3 giây (3000ms)
        }
    </script>
</body>
</html>
